services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: golden_gai
      POSTGRES_USER: golden_gai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_gai -d golden_gai"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: webutan/golden-guide:api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://golden_gai:${DB_PASSWORD}@db:5432/golden_gai
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    image: webutan/golden-guide:web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  db_data:
  uploads:
