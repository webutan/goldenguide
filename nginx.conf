server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # SPA: all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Socket.io (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass         http://api:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Proxy API requests to the Express container
    location /api/ {
        proxy_pass         http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20m;  # allow photo uploads
    }

    # Proxy uploaded photos to the Express container
    location /uploads/ {
        proxy_pass         http://api:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
